name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.7)'
        required: true
        default: 'v1.0.7'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packaging tools
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.14.1 -y --no-progress
          choco install innosetup -y --no-progress

      - name: Build Windows zip package
        shell: pwsh
        env:
          RTT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: ./scripts/package_windows.ps1

      - name: Build Windows MSI installer
        shell: pwsh
        continue-on-error: true
        env:
          RTT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: ./scripts/build_msi.ps1

      - name: Build Windows setup installer
        shell: pwsh
        env:
          RTT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: ./scripts/build_inno.ps1

      - name: Set up Python 3.8 for Windows 7
        id: setup-python38
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Build Windows 7 zip package
        shell: pwsh
        env:
          RTT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          PYTHON38: ${{ steps.setup-python38.outputs.python-path }}
        run: ./scripts/package_windows7.ps1

      - name: Build Windows 7 setup installer
        shell: pwsh
        env:
          RTT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          RTT_DIST_DIR: ${{ github.workspace }}\dist-win7\rtt_t2
          RTT_PACKAGE_SUFFIX: '7'
        run: ./scripts/build_inno.ps1

      - name: Collect Windows artifacts
        shell: pwsh
        env:
          RTT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/windows | Out-Null
          Copy-Item "dist/rtt_t2-$env:RTT_VERSION-windows-x64.zip" artifacts/windows/
          Copy-Item "dist/rtt_t2-$env:RTT_VERSION-windows-x64-setup.exe" artifacts/windows/
          Copy-Item "dist-win7/rtt_t2-$env:RTT_VERSION-windows7-x64.zip" artifacts/windows/
          Copy-Item "dist/rtt_t2-$env:RTT_VERSION-windows7-x64-setup.exe" artifacts/windows/
          $msi = "dist/rtt_t2-$env:RTT_VERSION-windows-x64.msi"
          if (Test-Path $msi) {
            Copy-Item $msi artifacts/windows/
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/windows/*

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Qt runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0

      - name: Build Linux package
        env:
          RTT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/rtt_t2-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}-linux-x64.tar.gz

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/windows/*
            artifacts/linux/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
